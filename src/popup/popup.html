<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>DanmakuPiP</title>
    <link rel="stylesheet" href="./popup.css" />
  </head>
  <body>
    <main class="app">
      <h1>DanmakuPiP</h1>
      <p id="statusText" class="status">检测中...</p>
      <div class="actions">
        <button id="startBtn" class="btn primary">启动 PiP 弹幕</button>
        <button id="stopBtn" class="btn">关闭 PiP 弹幕</button>
      </div>
      <button id="openOptionsBtn" class="btn ghost">打开设置</button>
      <p class="tip">支持站点：B站视频页、YouTube watch 页</p>
    </main>
    <script src="./popup.js"></script>
  </body>
</html>
